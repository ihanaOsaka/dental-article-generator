        search_terms:
          en: ["sports drinks dental erosion adolescents", "acidic beverages enamel erosion youth"]
          ja: ["スポーツドリンク 歯 酸蝕"]
        pico:
          population: "部活動をする小学生高学年〜高校生"
          intervention: "スポーツドリンク頻繁摂取"
          comparison: "水・お茶"
          outcome: "酸蝕・むし歯リスク"

