# 小児歯科記事トピック一覧
# 日本小児歯科学会「こどもたちの口と歯の質問箱」を参考に構成
# https://www.jspd.or.jp/question/

categories:
  - id: pregnancy
    name: "妊娠期"
    age_range: "妊娠中"
    topics:
      - id: pregnancy_calcium
        title: "妊娠中にカルシウムを摂ると赤ちゃんの歯が丈夫になる？"
        keywords: ["カルシウム", "妊娠", "歯の発育", "栄養"]
        search_terms:
          en: ["calcium intake pregnancy tooth development", "maternal nutrition dental"]
          ja: ["妊娠 カルシウム 歯", "胎児 歯の形成"]
        pico:
          population: "妊婦"
          intervention: "カルシウム摂取"
          comparison: "通常食事"
          outcome: "乳児の歯質・むし歯リスク"

      - id: pregnancy_xylitol
        title: "妊娠中のキシリトールで赤ちゃんのむし歯予防ができる？"
        keywords: ["キシリトール", "妊娠", "むし歯菌", "母子感染"]
        search_terms:
          en: ["xylitol pregnancy caries prevention", "maternal xylitol infant mutans streptococci"]
          ja: ["キシリトール 妊娠 むし歯"]
        pico:
          population: "妊婦"
          intervention: "キシリトール摂取"
          comparison: "非摂取"
          outcome: "乳幼児のミュータンス菌感染率"

      - id: pregnancy_dental_treatment
        title: "妊娠中の歯科治療は安全？いつ受けるべき？"
        keywords: ["妊娠", "歯科治療", "安定期", "麻酔"]
        search_terms:
          en: ["dental treatment during pregnancy safety", "pregnancy dental anesthesia"]
          ja: ["妊娠中 歯科治療 安全性"]
        pico:
          population: "妊婦"
          intervention: "歯科治療（安定期）"
          comparison: "治療延期"
          outcome: "母体・胎児への安全性"

      - id: pregnancy_periodontal
        title: "妊娠中の歯周病は赤ちゃんに影響する？"
        keywords: ["妊娠", "歯周病", "早産", "低体重児"]
        search_terms:
          en: ["periodontal disease pregnancy preterm birth", "maternal periodontitis adverse pregnancy outcomes"]
          ja: ["妊娠 歯周病 早産 低体重"]
        pico:
          population: "妊婦"
          intervention: "歯周病治療"
          comparison: "未治療"
          outcome: "早産・低体重児リスク"

  - id: infant
    name: "産まれてから2歳頃まで"
    age_range: "0〜2歳"
    topics:
      - id: infant_first_dental_visit
        title: "赤ちゃんの初めての歯医者はいつ？"
        keywords: ["初めて", "歯科受診", "乳歯", "生え始め"]
        search_terms:
          en: ["first dental visit infant timing", "early childhood dental visit caries prevention"]
          ja: ["乳幼児 初めて 歯科受診"]
        pico:
          population: "0〜1歳の乳児"
          intervention: "早期歯科受診（1歳前）"
          comparison: "3歳以降の初回受診"
          outcome: "むし歯発生率"

      - id: infant_fluoride_start
        title: "フッ素はいつから使っていいの？"
        keywords: ["フッ素", "フッ化物", "乳歯", "歯磨き粉"]
        search_terms:
          en: ["fluoride toothpaste infant age", "fluoride varnish infants caries prevention"]
          ja: ["フッ素 乳幼児 いつから"]
        pico:
          population: "0〜2歳の乳幼児"
          intervention: "フッ化物使用"
          comparison: "フッ化物未使用"
          outcome: "乳歯のむし歯予防効果"

      - id: infant_teething
        title: "歯が生える時の痛みや発熱にどう対応する？"
        keywords: ["歯の生え始め", "萌出", "発熱", "不機嫌"]
        search_terms:
          en: ["teething symptoms infant management", "teething fever evidence"]
          ja: ["歯の萌出 症状 乳児"]
        pico:
          population: "歯の萌出期の乳児"
          intervention: "歯固め・冷却など"
          comparison: "無処置"
          outcome: "症状緩和"

      - id: infant_bottle_caries
        title: "哺乳びんむし歯って何？寝かしつけの授乳は危険？"
        keywords: ["哺乳びん", "むし歯", "寝かしつけ", "母乳"]
        search_terms:
          en: ["baby bottle tooth decay", "nursing caries breastfeeding night", "early childhood caries bottle feeding"]
          ja: ["哺乳びん むし歯", "寝かしつけ 授乳 むし歯"]
        pico:
          population: "0〜2歳の乳幼児"
          intervention: "寝る前の授乳/哺乳びん使用"
          comparison: "寝る前の授乳回避"
          outcome: "むし歯発生率"

      - id: infant_snack
        title: "おやつの上手な与え方 — むし歯を作らない間食のルール"
        keywords: ["おやつ", "間食", "砂糖", "むし歯予防"]
        search_terms:
          en: ["snacking frequency caries children", "sugar intake dental caries infants"]
          ja: ["おやつ 頻度 むし歯 幼児"]
        pico:
          population: "1〜2歳の幼児"
          intervention: "規則的な間食"
          comparison: "ダラダラ食べ"
          outcome: "むし歯リスク"

      - id: infant_geographic_tongue
        title: "舌に模様がある！地図状舌って大丈夫？"
        keywords: ["地図状舌", "舌", "模様", "心配"]
        search_terms:
          en: ["geographic tongue children benign", "benign migratory glossitis pediatric"]
          ja: ["地図状舌 小児 経過"]
        pico:
          population: "地図状舌のある乳幼児"
          intervention: "経過観察"
          comparison: "治療介入"
          outcome: "自然経過・予後"

  - id: preschool
    name: "3歳ごろから就学前まで"
    age_range: "3〜6歳"
    topics:
      - id: preschool_thumb_sucking
        title: "指しゃぶりはいつまでなら大丈夫？歯並びへの影響は？"
        keywords: ["指しゃぶり", "歯並び", "開咬", "習癖"]
        search_terms:
          en: ["thumb sucking malocclusion children", "non-nutritive sucking habit dental effects"]
          ja: ["指しゃぶり 歯並び 影響"]
        pico:
          population: "3〜6歳の幼児"
          intervention: "指しゃぶり継続"
          comparison: "3歳までにやめる"
          outcome: "不正咬合リスク"

      - id: preschool_fluoride_application
        title: "歯医者でのフッ素塗布、本当に効果あるの？"
        keywords: ["フッ素塗布", "歯科", "予防", "効果"]
        search_terms:
          en: ["fluoride varnish caries prevention children effectiveness", "professional fluoride application pediatric"]
          ja: ["フッ素塗布 効果 小児"]
        pico:
          population: "3〜6歳の幼児"
          intervention: "定期的なフッ素塗布"
          comparison: "フッ素塗布なし"
          outcome: "むし歯予防効果"

      - id: preschool_toothpaste
        title: "子どもの歯磨き粉、どれを選べばいい？フッ素濃度は？"
        keywords: ["歯磨き粉", "フッ素濃度", "ppm", "選び方"]
        search_terms:
          en: ["fluoride toothpaste concentration children", "fluoride dentifrice caries prevention pediatric"]
          ja: ["子ども 歯磨き粉 フッ素濃度"]
        pico:
          population: "3〜6歳の幼児"
          intervention: "フッ素配合歯磨き粉使用"
          comparison: "フッ素なし歯磨き粉"
          outcome: "むし歯予防効果・フッ素症リスク"

      - id: preschool_silver_cap
        title: "乳歯に銀歯を入れたけど、永久歯に影響はない？"
        keywords: ["銀歯", "乳歯", "既製冠", "永久歯"]
        search_terms:
          en: ["stainless steel crown primary teeth", "preformed crown deciduous teeth outcomes"]
          ja: ["乳歯 銀歯 既製冠 永久歯"]
        pico:
          population: "乳歯に既製冠を装着した幼児"
          intervention: "乳歯既製冠装着"
          comparison: "未装着"
          outcome: "永久歯への影響"

      - id: preschool_dental_fear
        title: "子どもが歯医者を怖がる！上手に受診させるコツ"
        keywords: ["歯科恐怖", "小児", "行動管理", "怖がる"]
        search_terms:
          en: ["dental anxiety children management", "behavior management pediatric dentistry"]
          ja: ["子ども 歯医者 怖がる 対策"]
        pico:
          population: "歯科恐怖のある幼児"
          intervention: "行動管理テクニック"
          comparison: "通常対応"
          outcome: "治療協力度"

